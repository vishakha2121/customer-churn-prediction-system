version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: churn-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///app/database/churn.db
      - DEBUG=True
    volumes:
      - ../backend:/app
      - ../database:/app/database
    networks:
      - churn-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: churn-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - churn-network

  nginx:
    image: nginx:alpine
    container_name: churn-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - churn-network

networks:
  churn-network:
    driver: bridge